services:
  - type: web
    name: transit-backend
    runtime: python
    repo: https://github.com/sundar66kalyan/transit-intelligence-system
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.simple_backend:app --host 0.0.0.0 --port 10000
    plan: free

  - type: web
    name: transit-frontend
    runtime: python
    repo: https://github.com/sundar66kalyan/transit-intelligence-system
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run frontend/ultimate_app.py --server.port 10000 --server.address 0.0.0.0
    plan: free
    envVars:
      - key: API_URL
        value: https://transit-backend.onrender.com
