services:
  - type: web
    name: transit-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.working_backend:app --host 0.0.0.0 --port 10000
    plan: free
    healthCheckPath: /health

  - type: web
    name: transit-frontend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run frontend/ultimate_app.py --server.port 10000 --server.address 0.0.0.0
    plan: free
    envVars:
      - key: API_URL
        value: https://transit-backend.onrender.com
